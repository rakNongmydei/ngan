<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <title>Cute Urinary Quest 💧</title>
   <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            text-align: center; 
            background-color: #fff0f5; /* ชมพูอ่อนๆ แบบพาสเทล */
            padding: 20px; 
            color: #ff8fa3; 
        }
        #game-box { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 40px; 
            max-width: 450px; 
            margin: auto; 
            border: 6px solid #ffccd5; 
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5); 
        }
        h1 { font-size: 26px; margin-bottom: 20px; color: #ff6b8b; }
        .btn-grid { display: grid; gap: 15px; margin-top: 20px; }
        button { 
            padding: 15px; 
            cursor: pointer; 
            border: none; 
            border-radius: 20px; 
            background: #fff5f7; 
            color: #ff8fa3; 
            font-family: 'Kanit'; 
            font-weight: 600;
            transition: all 0.3s; 
            border: 2px solid #ffccd5;
        }
        button:hover { background: #ffccd5; color: white; transform: translateY(-3px); }
        #status { margin-top: 20px; font-weight: bold; color: #ff8fa3; font-size: 1.1em; }
        .music-btn { padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>

<div id="game-box">
    <h1>URINARY QUEST 💧</h1>
    <div id="output">
        <p>พร้อมผจญภัยกับโมเลกุลน้ำจิ๋วหรือยังคะ?</p>
        <button onclick="startGame()">เริ่มเล่นเล้ย!</button>
    </div>
    <div id="status"></div>
    <div style="margin-top: 20px;">
        <button onclick="toggleMusic()">🎵 เพลง</button>
        <button onclick="changeVolume(-0.1)">🔊 -</button>
        <button onclick="changeVolume(0.1)">🔊 +</button>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="game_music.mp3" type="audio/mpeg">
</audio>

<script>
  let stage = 0; let hp = 3; let score = 0;
 const questions = [
    { q: "ไตทำหน้าที่อะไรน้า?", options: ["ผลิตน้ำดี", "กรองของเสีย", "ย่อยโปรตีน", "ผลิตเลือด"], ans: 1 },
    { q: "ท่อที่นำปัสสาวะไปกระเพาะปัสสาวะคือ?", options: ["หลอดอาหาร", "ท่อไต", "ท่อปัสสาวะ", "หลอดลม"], ans: 1 },
    { q: "กระเพาะปัสสาวะมีหน้าที่?", options: ["ผลิตฮอร์โมน", "กรองเลือด", "กักเก็บปัสสาวะ", "ย่อยอาหาร"], ans: 2 },
    { q: "ท่อสุดท้ายที่นำปัสสาวะออกคือ?", options: ["ท่อปัสสาวะ", "ลำไส้ใหญ่", "ท่อไต", "เส้นเลือด"], ans: 0 },
    { q: "หน่วยกรองจิ๋วในไตชื่อว่า?", options: ["ถุงลม", "ตับอ่อน", "หน่วยไต", "กระเพาะ"], ans: 2 },
    { q: "สารที่ไม่ควรมีในปัสสาวะปกติ?", options: ["น้ำ", "โปรตีน/น้ำตาล", "เกลือแร่", "ยูเรีย"], ans: 1 },
    { q: "โรคที่มีน้ำตาลในปัสสาวะ?", options: ["เบาหวาน", "หัวใจ", "ตับ", "กระดูก"], ans: 0 },
    { q: "ปัสสาวะมีน้ำเป็นส่วนประกอบกี่ %?", options: ["50%", "75%", "85%", "95%"], ans: 4 },
    { q: "ดื่มน้ำน้อยเสี่ยงเป็นโรคอะไร?", options: ["นิ่วในไต", "เบาหวาน", "กระดูกพรุน", "ตับอักเสบ"], ans: 0 },
    // คำถามใหม่เกี่ยวกับพฤติกรรม
    { q: "หากรู้สึกปวดปัสสาวะควรทำอย่างไร?", options: ["อั้นไว้ก่อน", "รีบไปเข้าห้องน้ำ", "ดื่มน้ำเพิ่ม", "นอนพัก"], ans: 1 },
    { q: "อาหารรสจัดส่งผลอย่างไรต่อไต?", options: ["ช่วยบำรุงไต", "ไตทำงานหนักขึ้น", "ไตแข็งแรง", "ไม่มีผล"], ans: 1 },
    { q: "พฤติกรรมใดช่วยลดความเสี่ยงโรคนิ่ว?", options: ["ดื่มน้ำสะอาดเยอะๆ", "กินเค็ม", "งดผัก", "อั้นปัสสาวะนานๆ"], ans: 0 }
  ];

  function toggleMusic() { let m = document.getElementById("bgMusic"); m.paused ? m.play() : m.pause(); }
  function changeVolume(v) { let m = document.getElementById("bgMusic"); m.volume = Math.min(Math.max(m.volume + v, 0), 1); }
  function startGame() { stage = 0; hp = 3; score = 0; 
                        let music = document.getElementById("bgMusic");
    music.play().catch(error => console.log("รอการคลิกจากผู้ใช้"));
                        
                        showQuestion(); }
  function showQuestion() {
    if (hp <= 0) { document.getElementById('output').innerHTML = "💀 จบเกมแล้ว! คะแนน: " + score + "<br><br><button onclick='location.reload()'>เริ่มใหม่</button>"; return; }
    if (stage >= questions.length) { document.getElementById('output').innerHTML = "🌟 ยอดเยี่ยม! คะแนน: " + (score + (hp * 10)) + "<br><br><button onclick='location.reload()'>เริ่มใหม่</button>"; return; }
    let q = questions[stage];
    let html = `<p>${q.q}</p><div class="btn-grid">`;
    q.options.forEach((o, i) => html += `<button onclick="answer(${i})">${o}</button>`);
    document.getElementById('output').innerHTML = html + `</div>`;
    document.getElementById('status').innerText = "HP: " + "💖".repeat(hp) + " | Score: " + score;
  }
  function answer(i) { if (i === questions[stage].ans) score += 25; else hp -= 1; stage++; showQuestion(); }
</script>

</body>
</html>
