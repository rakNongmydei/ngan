<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Pixel Adventure: Urinary System</title>
    <style>
        /* สไตล์พิกเซล */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Press Start 2P', cursive;
        }
        #game-box { 
            width: 500px; 
            background: #ecf0f1; 
            padding: 30px; 
            border: 8px solid #000; 
            image-rendering: pixelated;
        }
        h1 { font-size: 16px; color: #e74c3c; }
        #output { font-size: 12px; margin-bottom: 20px; line-height: 2; }
        input { 
            width: 90%; padding: 10px; border: 4px solid #000; 
            font-family: 'Press Start 2P', cursive; 
        }
        button { 
            margin-top: 10px; background: #27ae60; color: white; border: none; 
            padding: 10px; cursor: pointer; font-family: 'Press Start 2P', cursive;
        }
    </style>
</head>
<body>

<div id="game-box">
    <h1>URINARY QUEST</h1>
    <div id="output">กดปุ่มเริ่มเกมเพื่อผจญภัย!</div>
    <input type="text" id="answer" placeholder="A/B/C">
    <button onclick="nextStep()">ตกลง</button>
</div>

<script>
    let stage = 0; let hp = 3; let score = 0;
    const questions = [
        { q: "ด่าน 1: ไตทำหน้าที่อะไร?<br>A) ย่อยอาหาร B) กรองของเสีย C) ปั๊มเลือด", ans: 'B' },
        { q: "ด่าน 2: ท่อส่งปัสสาวะสู่กระเพาะ?<br>A) ท่อไต B) หลอดอาหาร C) หลอดลม", ans: 'A' },
        { q: "ด่าน 3: กระเพาะปัสสาวะทำหน้าที่?<br>A) ย่อย B) ผลิตฮอร์โมน C) กักเก็บ", ans: 'C' },
        { q: "ด่าน 4: ท่อส่งออกนอกร่างกายคือ?<br>A) ท่อปัสสาวะ B) ลำไส้ C) เส้นเลือด", ans: 'A' }
    ];

    function nextStep() {
        let ans = document.getElementById('answer').value.toUpperCase();
        let output = document.getElementById('output');
        
        if (stage < questions.length) {
            if (stage > 0) {
                if (ans === questions[stage-1].ans) score += 25; else hp -= 1;
            }
            if (hp <= 0) { output.innerHTML = "💀 GAME OVER!"; stage = 99; }
            else { output.innerHTML = questions[stage].q + "<br><br>(HP: " + hp + ")"; stage++; }
        } else {
            if (ans === questions[3].ans) score += 25; else hp -= 1;
            output.innerHTML = "🏆 จบเกม! คะแนน: " + (score + (hp * 5));
        }
        document.getElementById('answer').value = '';
    }
</script>
</body>
</html>
