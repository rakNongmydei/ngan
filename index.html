<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Urinary System Quest: Pixel Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background-color: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Press Start 2P', cursive; }
        #game-box { width: 90%; max-width: 600px; background: #ecf0f1; padding: 20px; border: 8px solid #000; text-align: center; }
        h1 { font-size: 20px; color: #e74c3c; margin-bottom: 20px; }
        .question-text { font-size: 14px; margin-bottom: 20px; line-height: 1.8; color: #34495e; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #3498db; color: white; border: none; padding: 15px; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 12px; border: 4px solid #2980b9; }
        button:hover { background: #2980b9; }
        #status { margin-top: 20px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<div id="game-box">
    <h1>URINARY QUEST</h1>
    <div id="output">
        <p class="question-text">กดปุ่มเริ่มเกมเพื่อผจญภัยระบบปัสสาวะ!</p>
        <button onclick="startGame()">เริ่มเกม</button>
    </div>
    <div id="status"></div>
</div>

<script>
    let stage = 0; let hp = 3; let score = 0;
    const questions = [
        { q: "ไตทำหน้าที่หลักอะไร?", options: ["ผลิตน้ำดี", "กรองของเสีย", "ย่อยโปรตีน", "ผลิตเลือด"], ans: 1 },
        { q: "ท่อที่นำปัสสาวะจากไตไปกระเพาะ?", options: ["หลอดอาหาร", "ท่อไต", "ท่อปัสสาวะ", "หลอดลม"], ans: 1 },
        { q: "กระเพาะปัสสาวะทำหน้าที่?", options: ["ผลิตฮอร์โมน", "กรองเลือด", "กักเก็บปัสสาวะ", "ย่อยอาหาร"], ans: 2 },
        { q: "ท่อสุดท้ายที่นำปัสสาวะออกนอกร่างกาย?", options: ["ท่อปัสสาวะ", "ลำไส้ใหญ่", "ท่อไต", "เส้นเลือด"], ans: 0 },
        { q: "หน่วยกรองขนาดจิ๋วในไต?", options: ["ถุงลม", "ตับอ่อน", "หน่วยไต", "กระเพาะ"], ans: 2 },
        { q: "สารที่ไม่ควรพบในปัสสาวะปกติ?", options: ["น้ำ", "โปรตีน/น้ำตาล", "เกลือแร่", "ยูเรีย"], ans: 1 },
        { q: "โรคที่มีน้ำตาลปนในปัสสาวะ?", options: ["เบาหวาน", "หัวใจ", "ตับ", "กระดูก"], ans: 0 },
        { q: "ปัสสาวะปกติมีน้ำเป็นส่วนประกอบกี่ %?", options: ["50%", "75%", "85%", "95%"], ans: 3 },
        { q: "การดื่มน้ำน้อยเสี่ยงเป็นโรคอะไร?", options: ["นิ่วในไต", "เบาหวาน", "กระดูกพรุน", "ตับอักเสบ"], ans: 0 }
    ];

    function startGame() { stage = 0; hp = 3; score = 0; showQuestion(); }

    function showQuestion() {
        if (hp <= 0) {
            document.getElementById('output').innerHTML = "💀 GAME OVER!<br>คะแนนรวม: " + score;
            return;
        }
        if (stage >= questions.length) {
            document.getElementById('output').innerHTML = "🏆 ยินดีด้วย! ภารกิจสำเร็จ<br>คะแนนรวม: " + (score + (hp * 10));
            return;
        }

        let qData = questions[stage];
        let html = `<p class="question-text">${qData.q}</p><div class="btn-grid">`;
        qData.options.forEach((opt, i) => {
            html += `<button onclick="answer(${i})">${opt}</button>`;
        });
        html += `</div>`;
        document.getElementById('output').innerHTML = html;
        document.getElementById('status').innerText = "HP: " + "❤️".repeat(hp) + " | Score: " + score;
    }

    function answer(idx) {
        if (idx === questions[stage].ans) {
            score += 25;
        } else {
            hp -= 1;
        }
        stage++;
        showQuestion();
    }
</script>

</body>
</html>
