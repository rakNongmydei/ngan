<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <title>Cute Urinary Quest 💧</title>
    <style>
        body { font-family: 'Kanit', sans-serif; text-align: center; background-color: #fff0f5; padding: 20px; color: #ff8fa3; }
        #game-box { background: #ffffff; padding: 40px; border-radius: 40px; max-width: 450px; margin: auto; border: 6px solid #ffccd5; box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5); }
        h1 { font-size: 26px; margin-bottom: 20px; color: #ff6b8b; }
        .btn-grid { display: grid; gap: 15px; margin-top: 20px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 20px; background: #fff5f7; color: #ff8fa3; font-family: 'Kanit'; font-weight: 600; transition: all 0.3s; border: 2px solid #ffccd5; }
        button:hover { background: #ffccd5; color: white; transform: translateY(-3px); }
        /* สไตล์ปุ่มเปิดปิดเพลง */
        #music-btn { margin-bottom: 20px; padding: 10px 20px; font-size: 14px; }
        #status { margin-top: 20px; font-weight: bold; color: #ff8fa3; font-size: 1.1em; }
        input { padding: 10px; border-radius: 10px; border: 2px solid #ffccd5; width: 80%; margin-bottom: 10px; font-family: 'Kanit'; }
        .lb-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ffccd5; padding: 5px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="game_music.mp3" type="audio/mpeg">
</audio>

<div id="game-box">
    <button id="music-btn" onclick="toggleMusic()">🔊 เปิด/ปิด เพลง</button>
    <h1>URINARY QUEST 💧</h1>
    <div id="output">
        <p>ใส่ชื่อของคุณเพื่อเริ่มผจญภัย!</p>
        <input type="text" id="playerName" placeholder="พิมพ์ชื่อที่นี่...">
        <br>
        <button onclick="startGame()">เริ่มเล่นเล้ย!</button>
        <div id="leaderboard" style="margin-top:20px; text-align:left;">กำลังโหลดคะแนนออนไลน์...</div>
    </div>
    <div id="status"></div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_t8A53gWq0F3TKu8l8o63dJ6SCYl6Cp_lvHv8eLtHHOKaKrmUPa-_NnnkpuOLM72MMA/exec"; 
  
  // ตั้งค่าเพลง
  const audio = document.getElementById("bgMusic");
  audio.volume = 0.3; // ระดับเสียง 30%

  function toggleMusic() {
      if (audio.paused) {
          audio.play();
      } else {
          audio.pause();
      }
  }

  let stage = 0; let hp = 3; let score = 0; let playerName = ""; let startTime = 0;
  const questions = [
    { q: "ไตทำหน้าที่อะไรน้า?", options: ["ผลิตน้ำดี", "กรองของเสีย", "ย่อยโปรตีน", "ผลิตเลือด"], ans: 1 },
    { q: "ท่อที่นำปัสสาวะไปกระเพาะปัสสาวะคือ?", options: ["หลอดอาหาร", "ท่อไต", "ท่อปัสสาวะ", "หลอดลม"], ans: 1 },
    { q: "กระเพาะปัสสาวะมีหน้าที่?", options: ["ผลิตฮอร์โมน", "กรองเลือด", "กักเก็บปัสสาวะ", "ย่อยอาหาร"], ans: 2 },
    { q: "ท่อสุดท้ายที่นำปัสสาวะออกคือ?", options: ["ท่อปัสสาวะ", "ลำไส้ใหญ่", "ท่อไต", "เส้นเลือด"], ans: 0 },
    { q: "หน่วยกรองจิ๋วในไตชื่อว่า?", options: ["ถุงลม", "ตับอ่อน", "หน่วยไต", "กระเปาะ"], ans: 2 },
    { q: "สารที่ไม่ควรมีในปัสสาวะปกติ?", options: ["น้ำ", "โปรตีน/น้ำตาล", "เกลือแร่", "ยูเรีย"], ans: 1 },
    { q: "โรคที่มีน้ำตาลในปัสสาวะ?", options: ["เบาหวาน", "หัวใจ", "ตับ", "กระดูก"], ans: 0 },
    { q: "ปัสสาวะมีน้ำเป็นส่วนประกอบกี่ %?", options: ["50%", "75%", "85%", "95%"], ans: 3 },
    { q: "ดื่มน้ำน้อยเสี่ยงเป็นโรคอะไร?", options: ["นิ่วในไต", "เบาหวาน", "กระดูกพรุน", "ตับอักเสบ"], ans: 0 },
    { q: "หากรู้สึกปวดปัสสาวะควรทำอย่างไร?", options: ["อั้นไว้ก่อน", "รีบไปเข้าห้องน้ำ", "ดื่มน้ำเพิ่ม", "นอนพัก"], ans: 1 },
    { q: "อาหารรสจัดส่งผลอย่างไรต่อไต?", options: ["ช่วยบำรุงไต", "ไตทำงานหนักขึ้น", "ไตแข็งแรง", "ไม่มีผล"], ans: 1 },
    { q: "พฤติกรรมใดช่วยลดความเสี่ยงโรคนิ่ว?", options: ["ดื่มน้ำสะอาดเยอะๆ", "กินเค็ม", "งดผัก", "อั้นปัสสาวะนานๆ"], ans: 0 }
  ];

  function fetchLeaderboard() {
      fetch(SCRIPT_URL)
      .then(res => res.json())
      .then(data => {
          let scores = data.map(d => ({ name: d[0], score: d[1] }));
          scores.sort((a, b) => b.score - a.score);
          let html = "<h3>🌍 อันดับออนไลน์ (Top 5)</h3>";
          scores.slice(0, 5).forEach((s, i) => {
              html += `<div class="lb-item"><span>${i+1}. ${s.name}</span> <span>${s.score}</span></div>`;
          });
          document.getElementById('leaderboard').innerHTML = html;
      }).catch(() => document.getElementById('leaderboard').innerHTML = "โหลดคะแนนไม่สำเร็จ");
  }

  function startGame() {
      playerName = document.getElementById("playerName").value;
      if (!playerName) { alert("กรุณาใส่ชื่อ!"); return; }
      
      audio.play(); // เริ่มเล่นเพลง
      stage = 0; hp = 3; score = 0;
      showQuestion();
  }
